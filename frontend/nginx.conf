# Single-origin nginx config for the appointment-booking frontend.
# - Serves the built SPA from /usr/share/nginx/html.
# - Proxies /api/* and /socket.io/* to the backend container.
# - SPA fallback so React Router deep links return index.html.
#
# TLS is handled one layer up (host nginx, Traefik, Caddy, or a managed LB).
# This config terminates plain HTTP on port 80 inside the container.

upstream backend {
    server backend:3000;
    keepalive 16;
}

# Gzip text responses. Static assets are also pre-compressible at build time
# (vite + a plugin) but this covers everything for free.
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

server {
    listen 80;
    server_name _;

    # Keep request bodies modest. Backend already enforces a 100kb default,
    # but a server-side ceiling defends bandwidth too.
    client_max_body_size 256k;

    # Container-level health probe. Does not hit the backend so it never
    # blocks rolling restarts.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Long-lived hashed assets — cache hard. Vite emits ./assets/ with content
    # hashes so the URL changes whenever the file does.
    location /assets/ {
        root /usr/share/nginx/html;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Backend REST API.
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Socket.io: long-polling + websocket upgrade. read_timeout must exceed
    # the socket.io ping interval (default 25s) or idle connections drop.
    location /socket.io/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # SPA: try static asset, then fall through to index.html so React Router
    # owns the route table for everything else.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Security headers on the HTML response. CSP is intentionally narrow:
        # same-origin only, allowing inline styles (Tailwind utility classes
        # do not need 'unsafe-inline' but a few component libraries do — drop
        # this directive once you've verified the bundle is clean).
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

        # index.html itself must never be cached or users see stale bundles
        # after a deploy. Hashed assets above have their own cache header.
        location = /index.html {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store, must-revalidate";
            expires 0;
        }
    }
}
